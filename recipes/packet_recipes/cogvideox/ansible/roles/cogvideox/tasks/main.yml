---
# CogVideoX Installation

- name: Install system dependencies
  ansible.builtin.apt:
    name:
      - git
      - python3
      - python3-venv
      - python3-dev
      - python3-pip
      - ffmpeg
    state: present
    update_cache: yes
  retries: 3
  delay: 10

- name: Display pre-install message
  ansible.builtin.debug:
    msg: "Starting CogVideoX installation..."

- name: Clone CogVideo repository
  ansible.builtin.git:
    repo: https://github.com/THUDM/CogVideo.git
    dest: /opt/cogvideox
    version: main
    force: yes
  retries: 3
  delay: 10

- name: Create Python virtual environment
  ansible.builtin.command:
    cmd: python3 -m venv /opt/cogvideox/venv
    creates: /opt/cogvideox/venv/bin/python

- name: Install PyTorch nightly with CUDA 12.8
  ansible.builtin.pip:
    name:
      - torch
      - torchvision
      - torchaudio
    extra_args: "--index-url https://download.pytorch.org/whl/nightly/cu128"
    virtualenv: /opt/cogvideox/venv
  retries: 3
  delay: 10

- name: Install requirements from repository
  ansible.builtin.pip:
    requirements: /opt/cogvideox/requirements.txt
    virtualenv: /opt/cogvideox/venv
  retries: 3
  delay: 10

- name: Install Gradio and diffusers dependencies
  ansible.builtin.pip:
    name:
      - gradio
      - diffusers
      - transformers
      - accelerate
      - sentencepiece
    virtualenv: /opt/cogvideox/venv
  retries: 3
  delay: 10

- name: Create Gradio launch script
  ansible.builtin.copy:
    dest: /opt/cogvideox/launch.py
    mode: "0755"
    content: |
      #!/usr/bin/env python3
      """CogVideoX Gradio Web UI - Text to Video generation."""

      import gradio as gr
      import torch
      from diffusers import CogVideoXPipeline
      from diffusers.utils import export_to_video
      import tempfile
      import os

      pipe = None

      def load_model():
          global pipe
          if pipe is None:
              pipe = CogVideoXPipeline.from_pretrained(
                  "THUDM/CogVideoX-2b",
                  torch_dtype=torch.float16,
              )
              pipe.enable_model_cpu_offload()
          return pipe

      def generate_video(prompt, num_frames, guidance_scale, num_inference_steps):
          pipeline = load_model()
          video = pipeline(
              prompt=prompt,
              num_frames=int(num_frames),
              guidance_scale=float(guidance_scale),
              num_inference_steps=int(num_inference_steps),
          ).frames[0]
          with tempfile.NamedTemporaryFile(suffix=".mp4", delete=False, dir="/tmp") as f:
              export_to_video(video, f.name)
              return f.name

      with gr.Blocks(title="CogVideoX") as demo:
          gr.Markdown("# CogVideoX - Text to Video Generation")
          with gr.Row():
              with gr.Column():
                  prompt = gr.Textbox(label="Prompt", placeholder="Describe the video you want to generate...", lines=3)
                  num_frames = gr.Slider(minimum=8, maximum=48, value=16, step=8, label="Number of Frames")
                  guidance_scale = gr.Slider(minimum=1.0, maximum=20.0, value=6.0, step=0.5, label="Guidance Scale")
                  num_inference_steps = gr.Slider(minimum=10, maximum=100, value=50, step=5, label="Inference Steps")
                  generate_btn = gr.Button("Generate Video", variant="primary")
              with gr.Column():
                  output_video = gr.Video(label="Generated Video")
          generate_btn.click(fn=generate_video, inputs=[prompt, num_frames, guidance_scale, num_inference_steps], outputs=output_video)

      if __name__ == "__main__":
          demo.launch(server_name="{{ cogvideox_host }}", server_port={{ cogvideox_port }})
  notify: restart cogvideox

- name: Create systemd service for CogVideoX
  ansible.builtin.copy:
    dest: /etc/systemd/system/cogvideox.service
    mode: "0644"
    content: |
      [Unit]
      Description=CogVideoX Gradio Web UI
      After=network.target

      [Service]
      Type=simple
      User=root
      WorkingDirectory=/opt/cogvideox
      ExecStart=/opt/cogvideox/venv/bin/python /opt/cogvideox/launch.py
      Restart=on-failure
      RestartSec=10
      Environment=PYTHONUNBUFFERED=1

      [Install]
      WantedBy=multi-user.target
  notify: restart cogvideox

- name: Enable and start CogVideoX service
  ansible.builtin.systemd:
    name: cogvideox
    enabled: true
    state: started
    daemon_reload: true

- name: Display deployment summary
  ansible.builtin.debug:
    msg:
      - "CogVideoX deployment complete."
      - "Listening on: {{ cogvideox_host }}:{{ cogvideox_port }}"
      - "Service status: enabled and running"
      - "Web UI: http://{{ cogvideox_host }}:{{ cogvideox_port }}"
      - "The model will be downloaded on first use."
