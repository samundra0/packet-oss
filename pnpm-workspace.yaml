# Dependency overrides (moved here from package.json "pnpm" field,
# which pnpm 10+ no longer reads). Values must match pnpm-lock.yaml.
overrides:
  qs: '>=6.14.1'
  lodash: '>=4.17.23'

# Dependencies allowed to run install/build scripts. pnpm 10 blocks these by
# default; the list below is the native/build-tool deps the app needs.
# Deliberately omitted: @scarf/scarf and core-js-pure (telemetry/donation
# postinstalls with no functional effect).
onlyBuiltDependencies:
  - '@prisma/client'
  - '@prisma/engines'
  - prisma
  - argon2
  - bcrypt
  - better-sqlite3
  - sharp
  - ssh2
  - cpu-features
  - bufferutil
  - esbuild
  - protobufjs
  - hnswlib-node
  - tree-sitter
  - tree-sitter-json
  - '@tree-sitter-grammars/tree-sitter-yaml'
  - agentdb
  - unrs-resolver
