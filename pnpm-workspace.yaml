# OSS pnpm settings (overlaid over the repo's root pnpm-workspace.yaml at export).
#
# Why this differs from the Pro repo's root file: the Pro CI builds on a
# toolchain-free node:22 image and leaves compile-heavy deps OFF, but an OSS
# install runs on a real server (install.sh) and the app genuinely needs the
# native modules built — argon2/bcrypt (auth), ssh2/cpu-features (web terminal),
# better-sqlite3, sharp (images), etc. So OSS approves their build scripts.
#
# pnpm 11 reads the allowBuilds map (true/false); pnpm 10 reads
# onlyBuiltDependencies (array). Both are kept so either version installs
# cleanly without prompting (the install scripts run unattended).

# Dependency overrides (moved here from package.json "pnpm" field,
# which pnpm 10+ no longer reads). Values must match pnpm-lock.yaml.
overrides:
  qs: '>=6.14.1'
  lodash: '>=4.17.23'

allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  prisma: true
  argon2: true
  bcrypt: true
  better-sqlite3: true
  sharp: true
  ssh2: true
  cpu-features: true
  bufferutil: true
  esbuild: true
  protobufjs: true
  hnswlib-node: true
  tree-sitter: true
  tree-sitter-json: true
  '@tree-sitter-grammars/tree-sitter-yaml': true
  agentdb: true
  unrs-resolver: true
  '@scarf/scarf': false
  core-js-pure: false

onlyBuiltDependencies:
  - '@prisma/client'
  - '@prisma/engines'
  - prisma
  - argon2
  - bcrypt
  - better-sqlite3
  - sharp
  - ssh2
  - cpu-features
  - bufferutil
  - esbuild
  - protobufjs
  - hnswlib-node
  - tree-sitter
  - tree-sitter-json
  - '@tree-sitter-grammars/tree-sitter-yaml'
  - agentdb
  - unrs-resolver
