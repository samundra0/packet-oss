# Dependency overrides (moved here from package.json "pnpm" field,
# which pnpm 10+ no longer reads). Values must match pnpm-lock.yaml.
overrides:
  qs: '>=6.14.1'
  lodash: '>=4.17.23'

# Build-script approvals.
# pnpm 11 reads the allowBuilds map (true/false); pnpm 10 reads
# onlyBuiltDependencies (array). Both are kept so either version installs
# cleanly without prompting (the install scripts run unattended).
# true  = native / build-tool deps the app needs at runtime or build.
# false = telemetry / donation postinstalls with no functional effect.
allowBuilds:
  '@prisma/client': true
  '@prisma/engines': true
  prisma: true
  argon2: true
  bcrypt: true
  better-sqlite3: true
  sharp: true
  ssh2: true
  cpu-features: true
  bufferutil: true
  esbuild: true
  protobufjs: true
  hnswlib-node: true
  tree-sitter: true
  tree-sitter-json: true
  '@tree-sitter-grammars/tree-sitter-yaml': true
  agentdb: true
  unrs-resolver: true
  '@scarf/scarf': false
  core-js-pure: false

onlyBuiltDependencies:
  - '@prisma/client'
  - '@prisma/engines'
  - prisma
  - argon2
  - bcrypt
  - better-sqlite3
  - sharp
  - ssh2
  - cpu-features
  - bufferutil
  - esbuild
  - protobufjs
  - hnswlib-node
  - tree-sitter
  - tree-sitter-json
  - '@tree-sitter-grammars/tree-sitter-yaml'
  - agentdb
  - unrs-resolver
